version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus-sales-db
    restart: always
    env_file:
      - docker.env # ✅ Lee SOLO este archivo
    environment:
      - NODE_ENV=production # Valor fijo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
